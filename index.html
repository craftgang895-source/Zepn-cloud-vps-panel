<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeron Cloud</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #140021, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Animated glow */
body::before {
  content: "";
  position: absolute;
  width: 700px;
  height: 700px;
  background: #8b5cf6;
  filter: blur(220px);
  opacity: 0.25;
  animation: glowMove 12s infinite alternate;
}

@keyframes glowMove {
  0% { transform: translate(-200px, -200px); }
  100% { transform: translate(200px, 200px); }
}

/* Card animation */
.container {
  animation: popUp 0.9s ease;
}

@keyframes popUp {
  from { transform: scale(0.8) translateY(60px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.login-box {
  width: 370px;
  padding: 35px;
  border-radius: 16px;
  background: rgba(18,18,18,0.95);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 35px rgba(139,92,246,0.4);
  text-align: center;
  position: relative;
}

/* Title */
.brand {
  font-size: 20px;
  color: #a855f7;
  font-weight: bold;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

h2 {
  color: white;
  margin-bottom: 20px;
}

/* Error Message */
.error {
  display: none;
  background: rgba(255, 0, 0, 0.1);
  color: #ff4d4d;
  padding: 8px;
  border-radius: 6px;
  margin-bottom: 15px;
  font-size: 13px;
  animation: shake 0.3s;
}

@keyframes shake {
  0% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  100% { transform: translateX(0); }
}

/* Inputs */
.input-box {
  position: relative;
  margin-bottom: 20px;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border: 1px solid #333;
  border-radius: 8px;
  background: transparent;
  color: white;
  outline: none;
}

.input-box label {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
  transition: 0.3s;
  pointer-events: none;
}

.input-box input:focus + label,
.input-box input:valid + label {
  top: -8px;
  font-size: 12px;
  color: #a855f7;
  background: #121212;
  padding: 0 5px;
}

/* Options */
.options {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #ccc;
  margin-bottom: 20px;
}

.options a {
  color: #a855f7;
  text-decoration: none;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #7b2ff7, #a855f7);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #a855f7;
}

</style>
</head>

<body>

<div class="container">
  <div class="login-box">

    <div class="brand">☁️ ZERON CLOUD</div>
    <h2>Welcome Back</h2>

    <div id="errorBox" class="error">Credentials can't match ❌</div>

    <form onsubmit="return loginCheck()">

      <div class="input-box">
        <input type="email" id="email" required>
        <label>Email Address</label>
      </div>

      <div class="input-box">
        <input type="password" id="password" required>
        <label>Password</label>
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember</label>
        <a href="#">Forgot?</a>
      </div>

      <button type="submit">Login</button>

    </form>

  </div>
</div>

<script>
function loginCheck() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorBox = document.getElementById("errorBox");

  if(email === "aayanrajput593@gmail.com" && password === "Aayan987") {
    alert("Login Successful 🚀");
  } else {
    errorBox.style.display = "block";
  }
  return false;
}
</script>

</body>
</html>
