<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeron Cloud Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: radial-gradient(circle at top, #1a002b, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* Background glow animation */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: purple;
  filter: blur(200px);
  opacity: 0.3;
  animation: moveGlow 10s infinite alternate;
}

@keyframes moveGlow {
  0% { transform: translate(-200px, -200px); }
  100% { transform: translate(200px, 200px); }
}

/* Container animation */
.container {
  animation: slideUp 1s ease forwards;
  opacity: 0;
}

@keyframes slideUp {
  from { transform: translateY(80px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.login-box {
  background: rgba(20, 20, 20, 0.95);
  padding: 40px;
  width: 360px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 30px rgba(140, 0, 255, 0.5);
  backdrop-filter: blur(10px);
}

/* Logo */
.logo {
  font-size: 35px;
  margin-bottom: 10px;
  color: #a855f7;
}

h2 {
  color: white;
  margin-bottom: 25px;
}

/* Inputs */
.input-box {
  position: relative;
  margin-bottom: 25px;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border: 1px solid #333;
  border-radius: 8px;
  background: transparent;
  color: white;
  outline: none;
}

.input-box label {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
  font-size: 14px;
  transition: 0.3s;
  pointer-events: none;
}

.input-box input:focus + label,
.input-box input:valid + label {
  top: -8px;
  font-size: 12px;
  color: #a855f7;
  background: #141414;
  padding: 0 5px;
}

/* Options */
.options {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 20px;
  color: #ccc;
}

.options a {
  color: #a855f7;
  text-decoration: none;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(45deg, #7b2ff7, #a855f7);
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #a855f7;
}

/* Footer text removed as requested */

</style>

</head>
<body>

<div class="container">
  <div class="login-box">

    <div class="logo">⚡</div>
    <h2>Welcome Back</h2>

    <form onsubmit="return loginCheck()">

      <div class="input-box">
        <input type="email" id="email" required>
        <label>Email Address</label>
      </div>

      <div class="input-box">
        <input type="password" id="password" required>
        <label>Password</label>
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember</label>
        <a href="#">Forgot?</a>
      </div>

      <button type="submit">Login</button>

    </form>

  </div>
</div>

<script>
function loginCheck() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(email === "aayanrajput593@gmail.com" && password === "Aayan987") {
    alert("Login Successful 🚀");
  } else {
    alert("Invalid Credentials ❌");
  }
  return false;
}
</script>

</body>
</html>
