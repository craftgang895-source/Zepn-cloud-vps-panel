<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeron Cloud Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #0a2540, #0f3b66);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Animation */
.container {
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-box {
  background: #fff;
  padding: 40px;
  width: 360px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

.logo {
  font-size: 32px;
  margin-bottom: 10px;
}

h2 {
  margin-bottom: 20px;
  color: #333;
}

.input-box {
  position: relative;
  margin-bottom: 20px;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  outline: none;
}

.input-box label {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #777;
  font-size: 14px;
  transition: 0.3s;
  pointer-events: none;
}

.input-box input:focus + label,
.input-box input:valid + label {
  top: -8px;
  font-size: 12px;
  background: white;
  padding: 0 5px;
  color: #0f3b66;
}

.options {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 20px;
}

.options a {
  text-decoration: none;
  color: #0f3b66;
}

button {
  width: 100%;
  padding: 12px;
  background: #0f3b66;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #124c85;
}

.signup {
  margin-top: 15px;
  font-size: 13px;
  color: #555;
}
</style>

</head>
<body>

<div class="container">
  <div class="login-box">

    <div class="logo">⚡</div>
    <h2>Welcome Back!</h2>

    <form onsubmit="return loginCheck()">

      <div class="input-box">
        <input type="email" id="email" required>
        <label>Email Address</label>
      </div>

      <div class="input-box">
        <input type="password" id="password" required>
        <label>Password</label>
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember Me</label>
        <a href="#">Forgot Password?</a>
      </div>

      <button type="submit">Login</button>

    </form>

    <p class="signup">Create a New Account</p>

  </div>
</div>

<script>
function loginCheck() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // Demo credentials
  if(email === "aayanrajput593@gmail.com" && password === "Aayan987") {
    alert("Login Successful 🚀");
    return false;
  } else {
    alert("Invalid Credentials ❌");
    return false;
  }
}
</script>

</body>
  </html>
